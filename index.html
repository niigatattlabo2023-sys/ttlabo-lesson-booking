<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新潟卓球ラボ - 業務管理システム</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 20px;
            text-align: center;
        }

        .card-icon.lesson {
            color: #667eea;
        }

        .card-icon.shop {
            color: #f093fb;
        }

        .card-icon.tournament {
            color: #4facfe;
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .card-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-development {
            background: #fff3cd;
            color: #856404;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-table-tennis"></i> 新潟卓球ラボ</h1>
            <p>業務管理システム</p>
        </div>

        <div class="cards">
            <a href="booking.html" class="card">
                <div class="card-icon lesson">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <h2>個人レッスン予約</h2>
                <p>お客様向けのレッスン予約フォームです。施設・日時を選択して予約申請ができます。</p>
                <span class="card-status status-available">利用可能</span>
            </a>

            <div class="card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="card-icon shop">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <h2>卓球用品卸売管理</h2>
                <p>Rallys、Rally ace、Pandani の3社の卓球用品を卸価格で提供します。</p>
                <span class="card-status status-development">開発中</span>
            </div>

            <div class="card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="card-icon tournament">
                    <i class="fas fa-trophy"></i>
                </div>
                <h2>大会管理システム</h2>
                <p>新潟卓球ラボのジュニアクラブメンバー向け大会案内・申込管理システムです。</p>
                <span class="card-status status-development">開発中</span>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="admin.html" class="card" style="max-width: 400px; margin: 0 auto; display: block;">
                <div class="card-icon" style="color: #ff6b6b;">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>管理者ログイン</h2>
                <p>予約管理・施設管理・スケジュール管理</p>
            </a>
        </div>

        <div class="footer">
            <p>&copy; 2026 新潟卓球ラボ - All Rights Reserved</p>
        </div>
    </div>
</body>
</html>
