<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レッスン予約 - 新潟卓球ラボ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f7fa;color:#333;}
header{background:linear-gradient(135deg,#1a3a5c,#0d6efd);color:#fff;padding:0;}
.header-inner{max-width:1100px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:44px;height:44px;background:#ff6b00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
.logo-text h1{font-size:1.3rem;font-weight:700;}
.logo-text p{font-size:0.75rem;opacity:0.85;}
nav a{color:#fff;text-decoration:none;margin-left:16px;font-size:0.9rem;opacity:0.9;}
nav a:hover{opacity:1;}
.container{max-width:800px;margin:0 auto;padding:30px 20px;}
h2{font-size:1.6rem;color:#1a3a5c;margin-bottom:8px;}
.subtitle{color:#666;margin-bottom:24px;}
.tabs{display:flex;gap:0;margin-bottom:30px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.tab-btn{flex:1;padding:14px;border:none;cursor:pointer;font-size:0.95rem;font-weight:600;transition:all 0.2s;background:#fff;color:#666;}
.tab-btn.active{background:#1a3a5c;color:#fff;}
.tab-btn:hover:not(.active){background:#f0f4f8;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 16px rgba(0,0,0,0.08);margin-bottom:24px;}
.card h3{font-size:1.1rem;color:#1a3a5c;margin-bottom:16px;border-bottom:2px solid #f0f4f8;padding-bottom:10px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:0.9rem;color:#444;}
.form-group select,.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;transition:border-color 0.2s;background:#fff;}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#0d6efd;}
.form-group textarea{resize:vertical;min-height:80px;}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
.slot{padding:10px;border-radius:8px;text-align:center;cursor:pointer;border:2px solid transparent;font-size:0.85rem;font-weight:600;transition:all 0.2s;}
.slot.available{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}
.slot.available:hover{background:#c8e6c9;border-color:#66bb6a;}
.slot.selected{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.slot.busy{background:#fce4ec;color:#c62828;cursor:not-allowed;}
.slot.closed{background:#f5f5f5;color:#9e9e9e;cursor:not-allowed;}
.facilities-list{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
.facility-item{padding:16px;border-radius:10px;border:2px solid #ddd;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;}
.facility-item:hover{border-color:#0d6efd;}
.facility-item.selected{border-color:#1a3a5c;background:#f0f4f8;}
.facility-item.ok{border-color:#4caf50;background:#f1f8e9;}
.facility-item.ng{border-color:#ef9a9a;background:#fce4ec;cursor:not-allowed;opacity:0.7;}
.badge{padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:600;}
.badge-ok{background:#c8e6c9;color:#2e7d32;}
.badge-ng{background:#ffcdd2;color:#c62828;}
.badge-pending{background:#fff9c4;color:#f57f17;}
.price-calc{background:linear-gradient(135deg,#1a3a5c,#0d6efd);color:#fff;border-radius:12px;padding:20px;margin:16px 0;}
.price-calc .price-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem;}
.price-calc .price-total{display:flex;justify-content:space-between;font-size:1.2rem;font-weight:700;border-top:1px solid rgba(255,255,255,0.3);padding-top:10px;margin-top:8px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:#ff6b00;color:#fff;}
.btn-primary:hover{background:#e55e00;transform:translateY(-2px);box-shadow:0 4px 14px rgba(255,107,0,0.4);}
.btn-block{width:100%;justify-content:center;}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.alert{padding:14px 18px;border-radius:10px;margin:16px 0;font-size:0.9rem;}
.alert-info{background:#e3f2fd;color:#1565c0;border-left:4px solid #1565c0;}
.alert-success{background:#e8f5e9;color:#2e7d32;border-left:4px solid #2e7d32;}
.alert-error{background:#fce4ec;color:#c62828;border-left:4px solid #c62828;}
.loading{text-align:center;padding:20px;color:#666;}
.loading i{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.step-indicator{display:flex;align-items:center;justify-content:center;margin-bottom:24px;gap:0;}
.step{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:#999;}
.step.active{color:#1a3a5c;font-weight:700;}
.step.done{color:#4caf50;}
.step-num{width:28px;height:28px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;}
.step-line{width:40px;height:2px;background:#ddd;margin:0 4px;}
footer{background:#1a3a5c;color:#fff;text-align:center;padding:20px;font-size:0.85rem;opacity:0.8;margin-top:40px;}
@media(max-width:500px){.tabs{flex-direction:column;}.step-line{width:20px;}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🏓</div>
      <div class="logo-text">
        <h1>新潟卓球ラボ</h1>
        <p>レッスン予約</p>

<div class="container">
  <h2><i class="fas fa-calendar-plus" style="color:#ff6b00"></i> レッスン予約</h2>

      <div id="A_selectedInfo" class="alert alert-info" style="margin-bottom:16px;"></div>
      <div class="form-group">
        <label>お名前 <span style="color:red">*</span></label>

      </div>
      <div class="form-group">
        <label>レッスンメニュー</label>
        <select id="A_menu">
          <option value="基礎練習">基礎練習</option>
          <option value="フォーム改善">フォーム改善</option>
          <option value="試合対策">試合対策</option>

      </div>

      <div class="form-group">
        <label>備考・ご要望</label>
        <textarea id="A_notes" placeholder="レベルや特に練習したい内容などをご記入ください"></textarea>
      </div>
      <div class="price-calc">
        <div class="price-row"><span>レッスン料</span><span id="A_priceDisplay">¥7,000</span></div>
        <div class="price-row"><span>施設利用料</span><span>別途実費</span></div>
        <div class="price-total"><span>合計目安</span><span id="A_totalDisplay">¥7,000〜</span></div>
      </div>
      <div id="A_formMsg"></div>
      <button class="btn btn-primary btn-block" onclick="A_submit()">
        <i class="fas fa-paper-plane"></i> 予約を申請する
      </button>
    </div>
  </div>

  <!-- パターンB -->
  <div id="tabB" class="tab-content">
    <div class="card">
      <h3><i class="fas fa-calendar-day"></i> ① 希望日時を選択</h3>
      <div class="form-group">
        <label>希望日（月曜日は定休日）</label>
        <input type="date" id="B_date" onchange="B_onDateChange()">

      <div id="B_timeArea" style="display:none">

          <label>希望開始時間</label>
          <select id="B_time" onchange="B_onTimeChange()">
            <option value="">-- 時間を選んでください --</option>

    </div>

    <div id="B_facilitiesCard" class="card" style="display:none">
      <h3><i class="fas fa-map-marker-alt"></i> ② 対応可能な施設</h3>
      <p style="color:#666;font-size:0.85rem;margin-bottom:16px;">Google Mapsの移動時間を考慮して対応可能な施設を表示しています</p>
      <div id="B_facilities" class="facilities-list"></div>
    </div>

    <div id="B_formCard" class="card" style="display:none">
      <h3><i class="fas fa-user"></i> ③ 申請情報を入力</h3>
      <div id="B_selectedInfo" class="alert alert-info" style="margin-bottom:16px;"></div>
      <div class="form-group">
        <label>お名前 <span style="color:red">*</span></label>
        <input type="text" id="B_name" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>電話番号 <span style="color:red">*</span></label>
        <input type="tel" id="B_phone" placeholder="090-1234-5678">
      </div>
      <div class="form-group">
        <label>メールアドレス <span style="color:red">*</span></label>
        <input type="email" id="B_email" placeholder="example@example.com">
      </div>
      <div class="form-group">
        <label>レッスンメニュー</label>
        <select id="B_menu">
          <option value="基礎練習">基礎練習</option>
          <option value="フォーム改善">フォーム改善</option>
          <option value="試合対策">試合対策</option>
          <option value="サーブ練習">サーブ練習</option>
          <option value="レシーブ練習">レシーブ練習</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>参加人数</label>
        <select id="B_participants" onchange="B_calcPrice()">
          <option value="1">1名</option>
          <option value="2">2名</option>
          <option value="3">3名</option>
        </select>
      </div>
      <div class="form-group">
        <label>レッスン時間</label>
        <select id="B_duration" onchange="B_calcPrice()">
          <option value="60">60分 ¥5,000</option>
          <option value="90" selected>90分 ¥7,000</option>
          <option value="120">120分 ¥9,000</option>
          <option value="150">150分 ¥11,000</option>
          <option value="180">180分 ¥13,000</option>
        </select>
      </div>
      <div class="form-group">
        <label>備考・ご要望</label>
        <textarea id="B_notes" placeholder="レベルや特に練習したい内容などをご記入ください"></textarea>
      </div>
      <div class="price-calc">
        <div class="price-row"><span>レッスン料</span><span id="B_priceDisplay">¥7,000</span></div>
        <div class="price-row"><span>施設利用料</span><span>別途実費</span></div>
        <div class="price-total"><span>合計目安</span><span id="B_totalDisplay">¥7,000〜</span></div>
      </div>
      <div id="B_formMsg"></div>
      <button class="btn btn-primary btn-block" onclick="B_submit()">
        <i class="fas fa-paper-plane"></i> 予約を申請する
      </button>
    </div>
  </div>
</div>

<footer>

<script>
// =====================================================
// Supabase 初期化（このファイルで1回だけ）
// =====================================================
const SUPABASE_URL = 'https://lwbysesbbehholrojonc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3YnlzZXNiYmVoaG9scm9qb25jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjcxNjMsImV4cCI6MjA4ODAwMzE2M30.2NwutCuF7mODQ3bZUlDumn-wx2zHLWR_gP1tjHQuNqg';
const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MAPS_API_KEY = 'AIzaSyBM0HaVsfDpQtSqDiHI1cBo3hh-kG6UYpU';
const HOME_ADDRESS = '新潟県燕市';

const PRICE_TABLE = {60:5000,90:7000,120:9000,150:11000,180:13000};

let facilities = [];
let A_selectedFacility = null;
let A_selectedSlot = null;
let B_selectedFacility = null;
let B_selectedDate = null;
let B_selectedTime = null;

// =====================================================
// 初期化
// =====================================================
async function init() {
  const today = new Date();
  const minDate = today.toISOString().split('T')[0];
  document.getElementById('A_date').min = minDate;
  document.getElementById('B_date').min = minDate;

  const { data, error } = await db.from('facilities').select('*').order('name');
  if (error) {
    console.error('施設読み込みエラー:', error);
    // フォールバック用デフォルト施設
    facilities = [
      {id:'1',name:'燕市体育センター',address:'新潟県燕市吉田日之出町1-1'},
      {id:'2',name:'三条市体育文化センター',address:'新潟県三条市上須頃5765'},
      {id:'3',name:'加茂市体育施設',address:'新潟県加茂市新保古川58-1'},
      {id:'4',name:'燕三条地場産業振興センター体育館',address:'新潟県三条市須頃1-17'}
    ];
  } else {
    facilities = data || [];
  }

  const sel = document.getElementById('A_facility');
  facilities.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.id;
    opt.textContent = f.name;
    sel.appendChild(opt);
  });
}

// =====================================================
// タブ切り替え
// =====================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='A'&&i===0)||(tab==='B'&&i===1)));
  document.getElementById('tabA').classList.toggle('active', tab==='A');
  document.getElementById('tabB').classList.toggle('active', tab==='B');
}

// =====================================================
// 日付バリデーション（月曜除外）
// =====================================================
function isMon(dateStr) {
  return new Date(dateStr + 'T00:00:00').getDay() === 1;
}

// =====================================================
// 料金計算
// =====================================================
function calcPrice(durId, priceId, totalId) {
  const dur = parseInt(document.getElementById(durId).value) || 90;
  const price = PRICE_TABLE[dur] || 7000;
  document.getElementById(priceId).textContent = '¥' + price.toLocaleString();
  document.getElementById(totalId).textContent = '¥' + price.toLocaleString() + '〜';
  return price;
}

function A_calcPrice() { return calcPrice('A_duration','A_priceDisplay','A_totalDisplay'); }
function B_calcPrice() { return calcPrice('B_duration','B_priceDisplay','B_totalDisplay'); }

// =====================================================
// スロット生成（9:00〜21:00、30分刻み）
// =====================================================
function generateSlots() {
  const slots = [];
  for (let h=9;h<21;h++) {
    for (let m=0;m<60;m+=30) {
      const hh = String(h).padStart(2,'0');
      const mm = String(m).padStart(2,'0');
      slots.push(`${hh}:${mm}`);
    }
  }
  return slots;
}

// =====================================================
// パターンA
// =====================================================
async function A_onFacilityChange() {
  const facId = document.getElementById('A_facility').value;
  A_selectedFacility = facilities.find(f=>f.id==facId) || null;
  A_selectedSlot = null;
  document.getElementById('A_dateCard').style.display = facId ? 'block' : 'none';
  document.getElementById('A_slotsCard').style.display = 'none';
  document.getElementById('A_formCard').style.display = 'none';
  document.getElementById('A_date').value = '';
}

async function A_onDateChange() {
  const date = document.getElementById('A_date').value;
  if (!date) return;

  if (isMon(date)) {
    document.getElementById('A_slots').innerHTML = '<p class="alert alert-error">月曜日は定休日です。別の日を選択してください。</p>';
    document.getElementById('A_slotsCard').style.display = 'block';
    document.getElementById('A_formCard').style.display = 'none';
    return;
  }

  document.getElementById('A_slotsCard').style.display = 'block';
  document.getElementById('A_formCard').style.display = 'none';
  document.getElementById('A_slots').innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> 空き状況を確認中...</div>';

  const bookedSlots = await getBookedSlots(date);
  const slots = generateSlots();
  let html = '';
  slots.forEach(s => {
    const [h,m] = s.split(':').map(Number);
    const isBooked = bookedSlots.some(b => {
      const [bh,bm] = b.start.split(':').map(Number);
      const [eh,em] = b.end.split(':').map(Number);
      const t=h*60+m, bs=bh*60+bm, be=eh*60+em;
      return t>=bs && t<be;
    });
    if (isBooked) {
      html += `<div class="slot busy">× ${s}</div>`;
    } else {
      html += `<div class="slot available" onclick="A_selectSlot('${s}')">○ ${s}</div>`;
    }
  });
  document.getElementById('A_slots').innerHTML = html;
}

function A_selectSlot(time) {
  A_selectedSlot = time;
  document.querySelectorAll('#A_slots .slot').forEach(el => {
    el.classList.remove('selected');
    if (el.textContent.includes(time)) el.classList.add('selected');
  });
  const facName = A_selectedFacility ? A_selectedFacility.name : '';
  const date = document.getElementById('A_date').value;
  document.getElementById('A_selectedInfo').innerHTML =
    `<i class="fas fa-check-circle"></i> <strong>${facName}</strong> ／ ${date} ${time}〜`;
  document.getElementById('A_formCard').style.display = 'block';
}

async function A_submit() {
  const name = document.getElementById('A_name').value.trim();
  const phone = document.getElementById('A_phone').value.trim();
  const email = document.getElementById('A_email').value.trim();
  const date = document.getElementById('A_date').value;

  if (!name || !phone || !email) {
    document.getElementById('A_formMsg').innerHTML = '<div class="alert alert-error">名前・電話番号・メールは必須です</div>';
    return;
  }
  if (!A_selectedSlot) {
    document.getElementById('A_formMsg').innerHTML = '<div class="alert alert-error">時間スロットを選択してください</div>';
    return;
  }

  const dur = parseInt(document.getElementById('A_duration').value);
  const price = PRICE_TABLE[dur] || 7000;
  const [sh,sm] = A_selectedSlot.split(':').map(Number);
  const endMin = sh*60+sm+dur;
  const endTime = String(Math.floor(endMin/60)).padStart(2,'0')+':'+String(endMin%60).padStart(2,'0');

  const { error } = await db.from('lesson_requests').insert({
    facility_id: A_selectedFacility.id,
    date: date,
    start_time: A_selectedSlot+':00',
    end_time: endTime+':00',
    duration_minutes: dur,
    applicant_name: name,
    applicant_phone: phone,
    applicant_email: email,
    lesson_type: document.getElementById('A_menu').value,
    participants: parseInt(document.getElementById('A_participants').value),
    notes: document.getElementById('A_notes').value,
    price: price,
    status: 'pending'
  });

  if (error) {
    document.getElementById('A_formMsg').innerHTML = `<div class="alert alert-error">送信エラー: ${error.message}</div>`;
  } else {
    document.getElementById('A_formCard').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> <strong>予約申請が完了しました！</strong><br>コーチから確認後、ご連絡いたします。</div>';
  }
}

// =====================================================
// パターンB
// =====================================================
function B_onDateChange() {
  const date = document.getElementById('B_date').value;
  if (!date) return;

  if (isMon(date)) {
    document.getElementById('B_timeArea').style.display = 'none';
    document.getElementById('B_facilitiesCard').style.display = 'none';
    document.getElementById('B_formCard').style.display = 'none';
    alert('月曜日は定休日です。別の日を選択してください。');
    return;
  }

  B_selectedDate = date;
  const sel = document.getElementById('B_time');
  sel.innerHTML = '<option value="">-- 時間を選んでください --</option>';
  generateSlots().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
  document.getElementById('B_timeArea').style.display = 'block';
  document.getElementById('B_facilitiesCard').style.display = 'none';
  document.getElementById('B_formCard').style.display = 'none';
}

async function B_onTimeChange() {
  const time = document.getElementById('B_time').value;
  if (!time) return;
  B_selectedTime = time;
  B_selectedFacility = null;

  document.getElementById('B_facilitiesCard').style.display = 'block';
  document.getElementById('B_formCard').style.display = 'none';
  document.getElementById('B_facilities').innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> 移動時間を計算中...</div>';

  const bookedSlots = await getBookedSlots(B_selectedDate);
  const [reqH,reqM] = time.split(':').map(Number);
  const reqStart = reqH*60+reqM;

  // 前後の予約を取得
  let prevEnd = null, nextStart = null;
  let prevAddr = HOME_ADDRESS, nextAddr = HOME_ADDRESS;

  bookedSlots.sort((a,b)=>a.start.localeCompare(b.start));
  bookedSlots.forEach(b => {
    const [bh,bm] = b.start.split(':').map(Number);
    const [eh,em] = b.end.split(':').map(Number);
    const bs=bh*60+bm, be=eh*60+em;
    if (be <= reqStart && (!prevEnd || be > prevEnd)) {
      prevEnd = be;
      prevAddr = b.address || HOME_ADDRESS;
    }
    if (bs >= reqStart && (!nextStart || bs < nextStart)) {
      nextStart = bs;
      nextAddr = b.address || HOME_ADDRESS;
    }
  });

  const freeBefore = prevEnd !== null ? reqStart - prevEnd : 999;
  const freeAfter = nextStart !== null ? nextStart - reqStart : 999;

  let html = '';
  for (const fac of facilities) {
    const travelFromPrev = await getTravelTime(prevAddr, fac.address);
    const travelToNext = await getTravelTime(fac.address, nextAddr);
    const canFit = (travelFromPrev <= freeBefore+15) && (travelToNext <= freeAfter+15);

    if (canFit) {
      html += `<div class="facility-item ok" onclick="B_selectFacility('${fac.id}')">
        <div><strong>${fac.name}</strong><br><small style="color:#666"><i class="fas fa-map-marker-alt"></i> ${fac.address}</small></div>
        <span class="badge badge-ok">✅ 対応可（移動約${Math.max(travelFromPrev,travelToNext)}分）</span>
      </div>`;
    } else {
      html += `<div class="facility-item ng">
        <div><strong>${fac.name}</strong><br><small style="color:#666"><i class="fas fa-map-marker-alt"></i> ${fac.address}</small></div>
        <span class="badge badge-ng">❌ 移動時間不足</span>
      </div>`;
    }
  }
  document.getElementById('B_facilities').innerHTML = html || '<p class="alert alert-error">対応可能な施設が見つかりませんでした</p>';
}

function B_selectFacility(facId) {
  B_selectedFacility = facilities.find(f=>f.id==facId) || null;
  document.querySelectorAll('#B_facilities .facility-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  const info = `<i class="fas fa-check-circle"></i> <strong>${B_selectedFacility.name}</strong> ／ ${B_selectedDate} ${B_selectedTime}〜`;
  document.getElementById('B_selectedInfo').innerHTML = info;
  document.getElementById('B_formCard').style.display = 'block';
}

async function B_submit() {
  const name = document.getElementById('B_name').value.trim();
  const phone = document.getElementById('B_phone').value.trim();
  const email = document.getElementById('B_email').value.trim();

  if (!name || !phone || !email) {
    document.getElementById('B_formMsg').innerHTML = '<div class="alert alert-error">名前・電話番号・メールは必須です</div>';
    return;
  }
  if (!B_selectedFacility || !B_selectedDate || !B_selectedTime) {
    document.getElementById('B_formMsg').innerHTML = '<div class="alert alert-error">施設・日時を選択してください</div>';
    return;
  }

  const dur = parseInt(document.getElementById('B_duration').value);
  const price = PRICE_TABLE[dur] || 7000;
  const [sh,sm] = B_selectedTime.split(':').map(Number);
  const endMin = sh*60+sm+dur;
  const endTime = String(Math.floor(endMin/60)).padStart(2,'0')+':'+String(endMin%60).padStart(2,'0');

  const { error } = await db.from('lesson_requests').insert({
    facility_id: B_selectedFacility.id,
    date: B_selectedDate,
    start_time: B_selectedTime+':00',
    end_time: endTime+':00',
    duration_minutes: dur,
    applicant_name: name,
    applicant_phone: phone,
    applicant_email: email,
    lesson_type: document.getElementById('B_menu').value,
    participants: parseInt(document.getElementById('B_participants').value),
    notes: document.getElementById('B_notes').value,
    price: price,
    status: 'pending'
  });

  if (error) {
    document.getElementById('B_formMsg').innerHTML = `<div class="alert alert-error">送信エラー: ${error.message}</div>`;
  } else {
    document.getElementById('B_formCard').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> <strong>予約申請が完了しました！</strong><br>コーチから確認後、ご連絡いたします。</div>';
  }
}

// =====================================================
// ユーティリティ
// =====================================================
async function getBookedSlots(date) {
  const slots = [];
  const { data: requests } = await db.from('lesson_requests')
    .select('start_time,end_time,facility_id')
    .eq('date', date)
    .eq('status', 'approved');
  if (requests) {
    requests.forEach(r => {
      const fac = facilities.find(f=>f.id==r.facility_id);
      slots.push({
        start: r.start_time.substring(0,5),
        end: r.end_time.substring(0,5),
        address: fac ? fac.address : HOME_ADDRESS
      });
    });
  }
  const { data: blocked } = await db.from('blocked_times').select('*').eq('date', date);
  if (blocked) {
    blocked.forEach(b => slots.push({start:b.start_time.substring(0,5),end:b.end_time.substring(0,5),address:HOME_ADDRESS}));
  }
  return slots;
}

async function getTravelTime(origin, destination) {
  if (origin === destination) return 0;
  try {
    const url = `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${encodeURIComponent(origin)}&destinations=${encodeURIComponent(destination)}&mode=driving&key=${MAPS_API_KEY}`;
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const data = await res.json();
    if (data.rows?.[0]?.elements?.[0]?.duration?.value) {
      return Math.ceil(data.rows[0].elements[0].duration.value / 60);
    }
  } catch(e) { console.warn('距離計算エラー:', e); }
  return 30; // フォールバック: 30分と仮定
}
