<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - 個人レッスン予約管理</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 90%;
        }
        
        .login-box h2 {
            color: var(--secondary-color);
            margin-bottom: 25px;
            text-align: center;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
        }
        
        .tab:hover {
            color: var(--primary-color);
        }
        
        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: var(--white);
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
        }
        
        .request-card {
            background: var(--white);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        .request-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow);
        }
        
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .request-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .request-badge.pending {
            background: #FFF3CD;
            color: #856404;
        }
        
        .request-badge.approved {
            background: #D1F2EB;
            color: #0F5132;
        }
        
        .request-badge.rejected {
            background: #F8D7DA;
            color: #842029;
        }
        
        .request-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .request-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dark);
        }
        
        .request-info-item i {
            color: var(--primary-color);
            width: 20px;
        }
        
        .request-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .btn-success {
            background: var(--success-color);
            color: var(--white);
        }
        
        .btn-success:hover {
            background: #05C090;
        }
        
        .btn-danger {
            background: var(--danger-color);
            color: var(--white);
        }
        
        .btn-danger:hover {
            background: #D93654;
        }
        
        .btn-secondary {
            background: var(--text-light);
            color: var(--white);
        }
        
        .btn-secondary:hover {
            background: var(--text-dark);
        }
        
        .facility-form {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .facility-card {
            background: var(--light-bg);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
        }
        
        .facility-card h4 {
            color: var(--secondary-color);
            margin-bottom: 10px;
        }
        
        .facility-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
        }
        
        .modal-close:hover {
            color: var(--danger-color);
        }
        
        .line-message-box {
            background: #06D6A0;
            color: var(--white);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            position: relative;
        }
        
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        @media (max-width: 768px) {
            .request-info {
                grid-template-columns: 1fr;
            }
            
            .request-actions {
                flex-direction: column;
            }
            
            .request-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> 管理者ログイン</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> ログイン
                </button>
            </form>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="container admin-container" id="admin-content" style="display: none;">
        <header class="header">
            <div class="logo">
                <i class="fas fa-table-tennis racket-icon"></i>
                <h1>管理画面</h1>
            </div>
            <button id="logout-btn" class="btn btn-outline">
                <i class="fas fa-sign-out-alt"></i> ログアウト
            </button>
        </header>

        <div class="main-content">
            <!-- 統計 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>新着申請</h3>
                    <div class="value" id="stat-pending">0</div>
                </div>
                <div class="stat-card">
                    <h3>今月の承認</h3>
                    <div class="value" id="stat-approved">0</div>
                </div>
                <div class="stat-card">
                    <h3>今月の売上</h3>
                    <div class="value" id="stat-revenue">¥0</div>
                </div>
            </div>

            <!-- タブ -->
            <div class="tabs">
                <button class="tab active" data-tab="requests">
                    <i class="fas fa-clipboard-list"></i> 予約申請
                </button>
                <button class="tab" data-tab="schedule">
                    <i class="fas fa-calendar"></i> 予定管理
                </button>
                <button class="tab" data-tab="facilities">
                    <i class="fas fa-building"></i> 施設マスタ
                </button>
            </div>

            <!-- 予約申請タブ -->
            <div id="tab-requests" class="tab-content active">
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">
                    <i class="fas fa-clipboard-list"></i> 予約申請一覧
                </h3>
                <div id="requests-list"></div>
            </div>

            <!-- 予定管理タブ -->
            <div id="tab-schedule" class="tab-content">
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">
                    <i class="fas fa-calendar"></i> 予定管理
                </h3>
                <button id="add-event-btn" class="btn btn-primary" style="margin-bottom: 20px;">
                    <i class="fas fa-plus"></i> プライベート予定を追加
                </button>
                <div id="schedule-list"></div>
            </div>

            <!-- 施設マスタタブ -->
            <div id="tab-facilities" class="tab-content">
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">
                    <i class="fas fa-building"></i> 施設マスタ
                </h3>
                <button id="add-facility-btn" class="btn btn-primary" style="margin-bottom: 20px;">
                    <i class="fas fa-plus"></i> 施設を追加
                </button>
                <div id="facilities-list"></div>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2026 ともきコーチ個人レッスン. All rights reserved.</p>
        </footer>
    </div>

    <!-- モーダル: 施設追加/編集 -->
    <div id="facility-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-building"></i> <span id="facility-modal-title">施設を追加</span></h3>
                <button class="modal-close" onclick="closeFacilityModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="facility-form">
                <input type="hidden" id="facility-id">
                <div class="form-group">
                    <label>施設名<span class="required">*</span></label>
                    <input type="text" id="facility-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>住所<span class="required">*</span></label>
                    <input type="text" id="facility-address" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="tel" id="facility-phone" class="form-control">
                </div>
                <div class="form-group">
                    <label>予約URL</label>
                    <input type="url" id="facility-url" class="form-control">
                </div>
                <div class="form-group">
                    <label>予約方法</label>
                    <select id="facility-method" class="form-control">
                        <option value="phone">電話予約</option>
                        <option value="web">Web予約</option>
                        <option value="both">電話・Web両方</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>備考</label>
                    <textarea id="facility-notes" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> 保存
                </button>
            </form>
        </div>
    </div>

    <!-- モーダル: プライベート予定追加 -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-plus"></i> プライベート予定を追加</h3>
                <button class="modal-close" onclick="closeEventModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="event-form">
                <div class="form-group">
                    <label>予定タイトル<span class="required">*</span></label>
                    <input type="text" id="event-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>カテゴリ<span class="required">*</span></label>
                    <select id="event-category" class="form-control" required>
                        <option value="lab">ラボの出稽古</option>
                        <option value="family">家族との予定</option>
                        <option value="personal">自主練習</option>
                        <option value="other">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>開始日時<span class="required">*</span></label>
                    <input type="datetime-local" id="event-start" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>終了日時<span class="required">*</span></label>
                    <input type="datetime-local" id="event-end" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>備考</label>
                    <textarea id="event-notes" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> 保存
                </button>
            </form>
        </div>
    </div>

    <!-- モーダル: 承認・却下 -->
    <div id="action-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> <span id="action-modal-title">予約を承認</span></h3>
                <button class="modal-close" onclick="closeActionModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="action-modal-body"></div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/pricing.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
